[server]
bind = "127.0.0.1:8080"
public_url = "http://localhost:8080"
admin_enabled = true

[storage]
kind = "fs-json"
path = "./data"

[media]
kind = "local"
path = "./media-store"
base_url = "http://localhost:8080/media"

[auth]
session_secret = "CHANGE_ME_EXAMPLE_SECRET_MIN_32_BYTES__"
jwt_issuer = "ferro-starter-blog"
allow_public_signup = false

[plugins]
dir = "./plugins"
max_memory_mb = 128
fuel_per_request = 10_000_000

# Capability grants per plugin. Drop the matching .wasm + plugin.toml into
# plugins/<name>/ to enable. See examples/plugin-* and docs/plugin-walkthrough.md.
[[plugins.grants]]
name = "hello"
capabilities = ["logs"]

[[plugins.grants]]
name = "seo"
capabilities = ["logs", "content.read"]

[[plugins.grants]]
name = "audit"
capabilities = ["logs"]

[[plugins.grants]]
name = "panic"
capabilities = ["logs"]
