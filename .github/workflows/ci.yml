name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          # Honors rust-toolchain.toml automatically; pinning here keeps the
          # job hermetic if the file is missing.
          toolchain: nightly-2026-01-15
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
      - uses: Swatinem/rust-cache@v2
      # The default ferro-storage feature set includes `surreal`, which pulls
      # in RocksDB. Provide its build deps.
      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang libclang-dev pkg-config
      - run: cargo build --workspace --locked
      - run: cargo test --workspace --locked

  feature-matrix:
    name: backend feature builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [fs-json, postgres, fs-markdown, surreal]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
      - uses: Swatinem/rust-cache@v2
      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang libclang-dev pkg-config
      - run: cargo build -p ferro-storage --no-default-features --features ${{ matrix.backend }}

  media-feature-matrix:
    name: media backend builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [local, s3, gcs]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p ferro-media --no-default-features --features ${{ matrix.backend }}

  docs:
    name: mdbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install mdbook
        run: |
          MDBOOK_VERSION=0.4.40
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin
      - run: mdbook build docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/book
      - uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: target/book
          retention-days: 7

  pages:
    name: deploy mdbook to GitHub Pages
    needs: docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  wasm-plugin:
    name: wasm plugin example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang libclang-dev pkg-config
      - name: build plugin-hello (wasm32-wasip2)
        run: |
          cargo build \
            --manifest-path examples/plugin-hello/Cargo.toml \
            --release \
            --target wasm32-wasip2
      - name: run wasm dispatch integration test
        env:
          WASM_TESTS: "1"
        run: cargo test -p ferro-plugin --test wasm_dispatch -- --nocapture

  bundle-budgets:
    name: admin bundle + perf budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang libclang-dev pkg-config
      - name: install cargo-leptos
        run: cargo install --locked cargo-leptos
      - name: build admin bundle (split + brotli)
        run: cargo run --release -p ferro-cli -- build
      - name: enforce perf budgets
        env:
          PERF_BUDGETS: strict
        run: cargo test -p ferro-cli --test perf_budgets -- --nocapture
