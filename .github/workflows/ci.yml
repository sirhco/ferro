name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          # Honors rust-toolchain.toml automatically; pinning here keeps the
          # job hermetic if the file is missing.
          toolchain: nightly-2026-01-15
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
      - uses: Swatinem/rust-cache@v2
      # The default ferro-storage feature set includes `surreal`, which pulls
      # in RocksDB. Provide its build deps.
      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang libclang-dev pkg-config
      - run: cargo build --workspace --locked
      - run: cargo test --workspace --locked

  feature-matrix:
    name: backend feature builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [fs-json, postgres, fs-markdown, surreal]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
      - uses: Swatinem/rust-cache@v2
      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang libclang-dev pkg-config
      - run: cargo build -p ferro-storage --no-default-features --features ${{ matrix.backend }}

  media-feature-matrix:
    name: media backend builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [local, s3, gcs]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-15
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p ferro-media --no-default-features --features ${{ matrix.backend }}
